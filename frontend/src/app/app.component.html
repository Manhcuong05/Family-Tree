<nav class="navbar glass-card">
  <div class="nav-brand">
    <span class="logo-text">Gia Phả Dòng Họ</span>
  </div>
  <div class="nav-links">
    <a routerLink="/dashboard" routerLinkActive="active">Trang chủ</a>
    <a routerLink="/tree" routerLinkActive="active">Phả Đồ</a>
    <a routerLink="/members" routerLinkActive="active">Thành Viên</a>
  </div>
  <div class="nav-auth">
    @if (authService.isLoggedIn()) {
      <div class="user-info" style="display: flex; align-items: center; gap: 1rem;">
        <span style="color: var(--color-text-muted); font-weight: 500;">Xin chào, {{ authService.getUsername() }}</span>
        <button class="btn btn-secondary" (click)="logout()">Đăng Xuất</button>
      </div>
    } @else {
      <button class="btn btn-primary" routerLink="/auth">Đăng Nhập</button>
    }
  </div>
</nav>

<main class="main-content">
  <router-outlet></router-outlet>
</main>
