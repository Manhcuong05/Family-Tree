<div class="auth-container">
  <div class="glass-card auth-card">
    <h2 class="text-center">Đăng Nhập</h2>
    <p class="text-center mb-4">Gia Phả Dòng Họ Trần Hải Phúc</p>
    
    <form>
      <div class="form-group">
        <label for="email">Tài khoản (Email/SĐT)</label>
        <input type="email" id="email" class="form-control" placeholder="Nhập tài khoản">
      </div>
      
      <div class="form-group">
        <label for="password">Mật khẩu</label>
        <input type="password" id="password" class="form-control" placeholder="Nhập mật khẩu">
      </div>
      
      <button type="button" class="btn btn-primary full-width mt-4" routerLink="/dashboard">Đăng Nhập Cội Nguồn</button>
    </form>
  </div>
</div>
