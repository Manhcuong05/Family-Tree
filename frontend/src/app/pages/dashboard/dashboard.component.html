<div class="lineage-home" [style.backgroundImage]="'url(' + (lineageInfo.bannerUrl || '/assets/images/home-bg.png') + ')'">
  <div class="overlay">
    <div class="home-logo">
      <img src="/assets/images/logo-giapha.png" alt="Logo">
      <h2 class="lineage-name">{{ lineageInfo.tenDongHo || 'Dòng Họ Trần Vũ Bản' }}</h2>
    </div>

    <div class="welcome-text">
      Xin kính chào <span class="user-name">Quý thành viên</span>
    </div>

    <div class="quick-stats">
      <div class="stat-box">
        <span class="icon">👥</span>
        <span class="label">Số thành viên:</span>
        <span class="value">{{ stats.totalMembers }}</span>
      </div>
      <div class="stat-box">
        <span class="icon">👴</span>
        <span class="label">Tổ phụ:</span>
        <span class="value">Chưa rõ</span>
      </div>
      <div class="stat-box">
        <span class="icon">📉</span>
        <span class="label">Số đời:</span>
        <span class="value">{{ stats.maxGeneration }}</span>
      </div>
    </div>

    <div class="menu-grid">
      <a routerLink="/members" class="menu-item">
        <div class="cloud-banner">XÂY DỰNG PHẢ HỆ</div>
      </a>
      <a routerLink="/tree" class="menu-item">
        <div class="cloud-banner">PHẢ ĐỒ</div>
      </a>
      <a routerLink="/info" class="menu-item">
        <div class="cloud-banner">THÔNG TIN DÒNG HỌ</div>
      </a>
      <a routerLink="/chronicles" class="menu-item">
        <div class="cloud-banner">PHẢ KÝ DÒNG HỌ</div>
      </a>
      <a routerLink="/list" class="menu-item">
        <div class="cloud-banner">DANH SÁCH THÀNH VIÊN</div>
      </a>
      <a routerLink="/events" class="menu-item">
        <div class="cloud-banner">SỰ KIỆN DÒNG HỌ</div>
      </a>
    </div>
  </div>
</div>
