<div class="tree-layout">
  <div class="tree-canvas glass-card">
    <div class="tree-controls">
      <button class="btn btn-secondary btn-sm">+</button>
      <button class="btn btn-secondary btn-sm">-</button>
      <button class="btn btn-secondary btn-sm">Mặc định</button>
    </div>
    
    <!-- Placeholder for OrgChart / Canvas -->
    <div class="tree-viewport">
      @if (treeData) {
        <app-tree-node 
          [node]="treeData" 
          [selectedNodeId]="selectedMember?.id"
          (select)="selectNode($event)">
        </app-tree-node>
      } @else {
        <div class="empty-tree">Đang tải dữ liệu phả đồ...</div>
      }
    </div>
  </div>

  @if (selectedMember) {
    <div class="side-panel glass-card">
      <div class="panel-header">
        <h3>Phả Ký Chi Tiết</h3>
        <button class="btn-close" (click)="selectedMember = null">×</button>
      </div>
      
      <div class="member-detail">
        <h4>{{ selectedMember.name }}</h4>
        <p><strong>Đời thứ:</strong> {{ selectedMember.soDoi }}</p>
        <p><strong>ID:</strong> <small>{{ selectedMember.id }}</small></p>
        
        <div class="mt-4">
          <button class="btn btn-primary full-width mb-2">Xem chi tiết</button>
          <button class="btn btn-secondary full-width">Chỉnh sửa</button>
        </div>
      </div>
    </div>
  }
</div>
